name: telegram
description: "Telegram Bot API access — send and receive messages via your bot"

policies:
  - name: telegram
    networkPolicies:
      - endpoint: api.telegram.org
        port: 443
        protocol: REST
        tlsTermination: true
        enforce: true
        methods:
          - GET
          - POST
        paths:
          - /bot*/sendMessage
          - /bot*/getUpdates
          - /bot*/setWebhook
          - /bot*/getMe
    binaries:
      - /usr/local/bin/openclaw

# Usage:
# 1. Copy this file to your NemoClaw agent directory
# 2. Set your bot token: export TELEGRAM_BOT_TOKEN=your-token
# 3. Apply: nemoclaw <name> policy-add
