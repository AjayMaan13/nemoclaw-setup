preset:
  name: neon
  description: "Neon serverless Postgres API access (least-privilege example)"

network_policies:
  neon:
    name: neon
    endpoints:
      - host: console.neon.tech
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/api/v2/**" }
          - allow: { method: POST, path: "/api/v2/**" }
          - allow: { method: PATCH, path: "/api/v2/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }
